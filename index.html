<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>🦸‍♂️ أسطورة أبطال الأرقام</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(#0a1a2f, #112d4e);
  color: #fff;
  text-align: center;
}

#game-container {
  width: 480px;
  margin: 30px auto;
  padding: 25px;
  border-radius: 20px;
  background: rgba(255,255,255,0.06);
  box-shadow: 0 0 25px #00eaff;
}

#start-screen {
  position: fixed;
  inset: 0;
  background: linear-gradient(#062241, #0a1a2f);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

#start-screen h1 {
  font-size: 50px;
  margin-bottom: 30px;
  text-shadow: 0 0 20px #00eaff;
}

#start-btn {
  padding: 18px 45px;
  font-size: 28px;
  border: none;
  border-radius: 15px;
  background: #00eaff;
  cursor: pointer;
}

/* البطل */
#hero {
  width: 160px;
  height: 230px;
  margin: 20px auto;
  position: relative;
  animation: hero-float 2.2s infinite;
}

#hero .head {
  width: 75px;
  height: 75px;
  background: #ffddb0;
  border-radius: 50%;
  margin: auto;
}

#hero .helmet {
  width: 90px;
  height: 55px;
  background: #444;
  border-radius: 50% 50% 20% 20%;
  position: absolute;
  top: -10px;
  left: 35px;
}

#hero .body {
  width: 60px;
  height: 110px;
  background: #1976ff;
  margin: auto;
  margin-top: -5px;
  border-radius: 12px;
}

@keyframes hero-float {
  50% { transform: translateY(-10px); }
}

#monster-box {
  background: #1f4068;
  padding: 20px;
  border-radius: 20px;
  margin-top: 15px;
}

#monster {
  font-size: 100px;
}

#monster-hp {
  width: 90%;
  height: 25px;
  background: #333;
  border-radius: 10px;
  margin: 10px auto;
}

#monster-hp-inner {
  height: 100%;
  background: #29ff74;
}

input {
  padding: 12px;
  font-size: 26px;
  border-radius: 10px;
  width: 200px;
  text-align: center;
}

button {
  padding: 15px 35px;
  font-size: 26px;
  background: #00eaff;
  border-radius: 15px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="start-screen">
  <h1>🦸‍♂️ أسطورة أبطال الأرقام</h1>
  <button id="start-btn">ابدأ المغامرة</button>
</div>

<div id="game-container">

<div id="hero">
  <div class="head"></div>
  <div class="helmet"></div>
  <div class="body"></div>
</div>

<div style="font-size:28px;color:#00eaff;">
  المستوى: <span id="level">١</span>
</div>

<div style="font-size:24px;">
  النقاط: <span id="score">٠</span>
</div>

<div id="monster-box">
  <div id="monster">👹</div>
  <div id="monster-hp"><div id="monster-hp-inner"></div></div>
  طاقة الوحش: <span id="hp">١٠٠</span>%
</div>

<div id="question" style="font-size:30px;margin-top:20px;"></div>

<input type="number" id="answer" placeholder="اكتب الجواب">
<br>
<button onclick="attack()">هجوم ⚡</button>

</div>

<script>
let level = 1;
let score = 0;
let x = 1, y = 1;
let monsterHP = 100, monsterMaxHP = 100;

document.getElementById("start-btn").onclick = () => {
  document.getElementById("start-screen").style.display = "none";
  newQuestion();
  updateHP();
};

document.getElementById("answer").addEventListener("keydown", e => {
  if (e.key === "Enter") attack();
});

function toArabic(n) {
  return n.toString().replace(/\d/g, d => "٠١٢٣٤٥٦٧٨٩"[d]);
}

function newQuestion() {
  x = Math.floor(Math.random() * 6) + 1;
  y = Math.floor(Math.random() * (10 - x + 1));
  document.getElementById("question").innerHTML =
    `كم يساوي ${toArabic(x)} + ${toArabic(y)} ؟`;
}

function updateHP() {
  let p = (monsterHP / monsterMaxHP) * 100;
  document.getElementById("monster-hp-inner").style.width = p + "%";
  document.getElementById("hp").innerHTML = toArabic(Math.round(p));
}

function attack() {
  let ans = parseInt(answer.value);
  if (isNaN(ans)) return;

  if (ans === x + y) {
    monsterHP -= 20;
    score += 10;
    if (monsterHP <= 0) winLevel();
    else newQuestion();
  } else {
    monsterHP += 10;
    if (monsterHP > monsterMaxHP) monsterHP = monsterMaxHP;
    score -= 2;
    if (score < 0) score = 0;
  }

  document.getElementById("score").innerHTML = toArabic(score);
  updateHP();
  answer.value = "";
}

function winLevel() {
  alert("🌟 أحسنت! أنت بطل الأرقام 🌟");
  level++;
  monsterMaxHP += 15;
  monsterHP = monsterMaxHP;
  document.getElementById("level").innerHTML = toArabic(level);
  updateHP();
  newQuestion();
}
</script>

</body>
</html>
